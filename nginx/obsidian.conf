# Agregar dentro de /etc/nginx/sites-enabled/
# Proxy para Obsidian GUI (KasmVNC) con SSL via certbot existente

server {
    listen 80;
    server_name obsidian.tudominio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name obsidian.tudominio.com;

    # Certbot gestionará estos certificados
    # sudo certbot --nginx -d obsidian.tudominio.com
    ssl_certificate /etc/letsencrypt/live/obsidian.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obsidian.tudominio.com/privkey.pem;

    # Autenticación básica — protege el acceso visual
    auth_basic "Obsidian";
    auth_basic_user_file /etc/nginx/.htpasswd_obsidian;

    # GUI de Obsidian (KasmVNC)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# API para agentes IA — solo acceso por IP interna o con token
# NO expongas esto sin autenticación si el servidor es público
server {
    listen 443 ssl http2;
    server_name obsidian-api.tudominio.com;

    ssl_certificate /etc/letsencrypt/live/obsidian-api.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obsidian-api.tudominio.com/privkey.pem;

    location / {
        # El API key de Obsidian ya actúa como autenticación
        proxy_pass http://127.0.0.1:27123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
